{{- if .Values.nodesets.enabled }}
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: {{ include "soperator-fluxcd.fullname" . }}-nodesets
  labels:
  {{- include "soperator-fluxcd.labels" . | nindent 4 }}
spec:
  {{- with .Values.nodesets.driftDetection }}
  driftDetection:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  chart:
    spec:
      chart: helm-nodesets
      interval: {{ .Values.nodesets.interval }}
      sourceRef:
        kind: HelmRepository
        name: {{ include "soperator-fluxcd.fullname" . }}-soperator
      version: {{ .Values.nodesets.version }}
  dependsOn:
  - name: {{ include "soperator-fluxcd.fullname" . }}-ns
  - name: {{ include "soperator-fluxcd.fullname" . }}-soperator
{{- if .Values.slurmCluster.enabled }}
  - name: {{ include "soperator-fluxcd.fullname" . }}-slurm-cluster
{{- end }}
{{- if .Values.customConfigmaps.enabled }}
  - name: {{ include "soperator-fluxcd.fullname" . }}-custom-configmaps
{{- end }}

  install:
    {{- toYaml .Values.nodesets.install | nindent 4 }}
  interval: {{ .Values.nodesets.interval }}
  timeout: {{ .Values.nodesets.timeout }}
  releaseName: {{ .Values.nodesets.releaseName }}
  targetNamespace: {{ .Values.nodesets.namespace }}
  upgrade:
    {{- toYaml .Values.nodesets.upgrade | nindent 4 }}
  {{- $nodesetsValues := dict "clusterName" .Values.nodesets.clusterName }}
  {{- if .Values.customConfigmaps.enabled }}
  {{- $_ := set $nodesetsValues "configMapRefSupervisord" (include "soperator-fluxcd.customSupervisordConfigMapName" .) }}
  {{- end }}
  {{- if .Values.nodesets.overrideValues }}
  {{- with .Values.nodesets.overrideValues }}
  {{- $nodesetsValues = mergeOverwrite $nodesetsValues (deepCopy .) }}
  {{- end }}
  {{- else }}
  {{- with .Values.nodesets.values }}
  {{- $nodesetsValues = mergeOverwrite $nodesetsValues (deepCopy .) }}
  {{- end }}
  {{- end }}
  values:
    {{- toYaml $nodesetsValues | nindent 4 }}
  valuesFrom:
  - kind: ConfigMap
    name: terraform-nodesets
    optional: true
    valuesKey: values.yaml
  - kind: ConfigMap
    name: nodesets
    optional: true
    valuesKey: values.yaml
{{- end }}

{{- if and .Values.observability.enabled .Values.observability.vmStack.enabled .Values.observability.ncclProfiles.enabled -}}

apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: {{ include "soperator-fluxcd.fullname" . }}-otelcol-nccl-profiles-cm
  labels:
  {{- include "soperator-fluxcd.labels" . | nindent 4 }}
spec:
  {{- with .Values.observability.ncclProfiles.driftDetection }}
  driftDetection:
    {{- toYaml . | nindent 4 }}
  {{- end }}

  chart:
    spec:
      chart: raw
      interval: {{ .Values.observability.ncclProfiles.interval }}
      sourceRef:
        kind: HelmRepository
        name: {{ include "soperator-fluxcd.fullname" . }}-bedag
      version: {{ .Values.observability.ncclProfiles.version.bedag }}

  dependsOn:
    - name: {{ include "soperator-fluxcd.fullname" . }}-ns

  install:
    {{- toYaml .Values.observability.ncclProfiles.install | nindent 4 }}
  upgrade:
    {{- toYaml .Values.observability.ncclProfiles.upgrade | nindent 4 }}
  interval: {{ .Values.observability.ncclProfiles.interval }}
  timeout: {{ .Values.observability.ncclProfiles.timeout }}
  releaseName: {{ .Values.observability.ncclProfiles.releaseName }}-cm
  targetNamespace: {{ .Values.observability.vmStack.namespace }}

  values:
  {{- if .Values.observability.ncclProfiles.configMapOverrideValues }}
    {{- toYaml .Values.observability.ncclProfiles.configMapOverrideValues | nindent 4 }}
  {{- else }}
  {{- $values := .Values.observability.ncclProfiles.values | default dict }}
  {{- $batch := $values.batch | default dict }}
  {{- $sendingQueue := $values.sendingQueue | default dict }}
  {{- $metrics := $values.metrics | default dict }}
  {{- $metricsEnabled := true }}
  {{- if hasKey $metrics "enabled" }}
  {{- $metricsEnabled = $metrics.enabled }}
  {{- end }}
  {{- $enableFileStorage := true }}
  {{- if hasKey $values "enableFileStorage" }}
  {{- $enableFileStorage = $values.enableFileStorage }}
  {{- end }}
  {{- $queueStorage := "" }}
  {{- if $enableFileStorage }}
  {{- $queueStorage = "file_storage" }}
  {{- end }}
  {{- $deleteAfterRead := $values.deleteAfterRead | default dict }}
  {{- $deleteAfterReadEnabled := false }}
  {{- if hasKey $deleteAfterRead "enabled" }}
  {{- $deleteAfterReadEnabled = $deleteAfterRead.enabled }}
  {{- end }}
  {{- $exportLabels := $values.exportLabels | default dict }}
    resources:
    - apiVersion: v1
      kind: ConfigMap
      metadata:
        namespace: {{ .Values.observability.vmStack.namespace }}
        name: {{ .Values.observability.ncclProfiles.releaseName }}-agent
      data:
        relay: |
          exporters:
            otlp_http/victoriametrics:
              compression: gzip
              encoding: proto
              metrics_endpoint: {{ $values.metricsEndpoint | default "http://vmsingle-metrics-victoria-metrics-k8s-stack:8428/opentelemetry/v1/metrics" }}
              timeout: {{ $values.metricsExporterTimeout | default "15s" }}
              retry_on_failure:
                enabled: true
                initial_interval: 1s
                max_interval: 10s
                max_elapsed_time: 0
{{ include "soperator-fluxcd.otelExporterSendingQueue" (dict "batch" $batch "queue" $sendingQueue "storage" $queueStorage) | indent 14 }}

          receivers:
            filelog/nccl_metrics:
              include:
                - {{ $values.dumpDir }}/*/*/*.log
              poll_interval: {{ $values.pollInterval | default "30s" }}
              retry_on_failure:
                enabled: true
                max_elapsed_time: 0
              include_file_path: true
              start_at: beginning
              {{- if $deleteAfterReadEnabled }}
              delete_after_read: true
              delete_after_read_min_age: {{ $deleteAfterRead.minAge | default "1m" }}
              {{- end }}
              {{- if $enableFileStorage }}
              storage: file_storage
              {{- end }}

              operators:
                - id: parse_nccl_profile_path
                  type: regex_parser
                  parse_from: attributes["log.file.path"]
                  regex: ^.*/(?P<job_id>[^/]+)/(?P<step_id>[^/]+)/(?P<worker_name>.+)-pid(?P<hostname_pid>[^/]+)\.log$

                - if: attributes["job_id"] != nil
                  type: copy
                  from: attributes.job_id
                  to: resource["{{ $exportLabels.slurmJobId | default "slurm_job_id" }}"]

                - if: attributes["step_id"] != nil
                  type: copy
                  from: attributes.step_id
                  to: resource["{{ $exportLabels.slurmStepId | default "slurm_step_id" }}"]

                - if: attributes["hostname_pid"] != nil
                  type: copy
                  from: attributes.hostname_pid
                  to: resource["{{ $exportLabels.hostnamePid | default "hostname_pid" }}"]

          connectors:
            ncclmetrics:

          service:
            {{- if $metricsEnabled }}
            telemetry:
              metrics:
                readers:
                  - pull:
                      exporter:
                        prometheus:
                          host: 0.0.0.0
                          port: 8889
            {{- end }}
            extensions:
              - health_check
              {{- if $enableFileStorage }}
              - file_storage
              {{- end }}
            pipelines:
              logs/nccl_metrics:
                receivers:
                  - filelog/nccl_metrics
                exporters:
                  - ncclmetrics

              metrics/nccl_metrics:
                receivers:
                  - ncclmetrics
                exporters:
                  - otlp_http/victoriametrics

          extensions:
            {{- if $enableFileStorage }}
            file_storage:
              directory: /var/lib/otelcol-nccl-profiles
            {{- end }}
            health_check:
              endpoint: 0.0.0.0:13133
  {{- end }}

  valuesFrom:
    - kind: ConfigMap
      name: terraform-opentelemetry-collector-nccl-profiles-cm
      optional: true
      valuesKey: values.yaml

    - kind: ConfigMap
      name: opentelemetry-collector-nccl-profiles-cm
      optional: true
      valuesKey: values.yaml
---

apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: {{ include "soperator-fluxcd.fullname" . }}-otelcol-nccl-profiles
  labels:
  {{- include "soperator-fluxcd.labels" . | nindent 4 }}
spec:
  {{- with .Values.observability.ncclProfiles.driftDetection }}
  driftDetection:
    {{- toYaml . | nindent 4 }}
  {{- end }}

  chart:
    spec:
      chart: opentelemetry-collector
      interval: {{ .Values.observability.ncclProfiles.interval }}
      sourceRef:
        kind: HelmRepository
        name: {{ include "soperator-fluxcd.fullname" . }}-opentelemetry-collector
      version: {{ .Values.observability.ncclProfiles.version.opentelemetryCollector }}

  dependsOn:
    - name: {{ include "soperator-fluxcd.fullname" . }}-ns
    - name: {{ include "soperator-fluxcd.fullname" . }}-vm-stack
    - name: {{ include "soperator-fluxcd.fullname" . }}-otelcol-nccl-profiles-cm

  install:
    {{- toYaml .Values.observability.ncclProfiles.install | nindent 4 }}
  upgrade:
    {{- toYaml .Values.observability.ncclProfiles.upgrade | nindent 4 }}
  interval: {{ .Values.observability.ncclProfiles.interval }}
  timeout: {{ .Values.observability.ncclProfiles.timeout }}
  releaseName: {{ .Values.observability.ncclProfiles.releaseName }}
  targetNamespace: {{ .Values.observability.vmStack.namespace }}

  values:
  {{- $values := .Values.observability.ncclProfiles.values | default dict }}
  {{- $metrics := $values.metrics | default dict }}
  {{- $metricsEnabled := true }}
  {{- if hasKey $metrics "enabled" }}
  {{- $metricsEnabled = $metrics.enabled }}
  {{- end }}
  {{- $mode := $values.mode | default "shared" }}
  {{- $enableFileStorage := true }}
  {{- if hasKey $values "enableFileStorage" }}
  {{- $enableFileStorage = $values.enableFileStorage }}
  {{- end }}
  {{- $deleteAfterRead := $values.deleteAfterRead | default dict }}
  {{- $deleteAfterReadEnabled := false }}
  {{- if hasKey $deleteAfterRead "enabled" }}
  {{- $deleteAfterReadEnabled = $deleteAfterRead.enabled }}
  {{- end }}
  {{- $useGoMemLimit := true }}
  {{- if hasKey $values "useGoMemLimit" }}
  {{- $useGoMemLimit = $values.useGoMemLimit }}
  {{- end }}
  {{- if .Values.observability.ncclProfiles.collectorOverrideValues }}
    {{- toYaml .Values.observability.ncclProfiles.collectorOverrideValues | nindent 4 }}
  {{- else }}
    clusterRole:
      create: true
      rules:
        - apiGroups:
            - ""
          resources:
            - pods
            - namespaces
          verbs:
            - get
            - watch
            - list

    image:
      pullPolicy: IfNotPresent
      repository: cr.eu-north1.nebius.cloud/observability/nebius-o11y-agent
      tag: {{ $values.nebiusO11yAgentVersion | default "2.0.10" }}

    {{- if eq $mode "shared" }}
    mode: deployment
    replicaCount: 1   # Only one replica to avoid file lock conflicts on shared storage and prevent log duplication

    rollout:
      strategy: Recreate  # Ensure old pod terminates before new one starts to maintain max one pod running

    affinity:
      nodeAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          nodeSelectorTerms:
            - matchExpressions:
                - key: slurm.nebius.ai/nodeset
                  operator: In
                  values:
                    - "system"
    {{- else }}{{- if eq $mode "nodeLocal" }}
    mode: daemonset

    rollout:
      rollingUpdate:
        maxUnavailable: 50%
      strategy: RollingUpdate

    affinity:
      nodeAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          nodeSelectorTerms:
            - matchExpressions:
                - key: slurm.nebius.ai/nodeset
                  operator: In
                  values:
                    - "worker"

    tolerations:
      - effect: NoSchedule
        key: nvidia.com/gpu
        operator: Exists
    {{- end }}{{- end }}

    extraVolumes:
      - name: jail
        hostPath:
          path: /mnt/jail
          type: Directory

      {{- if $enableFileStorage }}
      - name: varlibotelcol
        hostPath:
          path: /var/lib/otelcol-nccl-profiles
          type: DirectoryOrCreate
      {{- end }}

    extraVolumeMounts:
      - name: jail
        mountPath: /mnt/jail
        readOnly: true

      {{- if $enableFileStorage }}
      - name: varlibotelcol
        mountPath: /var/lib/otelcol-nccl-profiles
      {{- end }}

    securityContext:
      runAsGroup: 0
      runAsUser: 10001
    service: # No external access needed - this collector only reads files and sends to Victoria Logs
      enabled: false
    serviceAccount:
      create: true

    extraEnvs:
      {{- include "soperator-fluxcd.otelCollectorGoEnv" (dict "resources" $values.resources "useGoMemLimit" $useGoMemLimit) | nindent 6 }}

    initContainers:
      - command:
          - sh
          - "-c"
          - |
            set -eu
            dump_dir="{{ $values.dumpDir }}"
            case "$dump_dir" in
              /mnt/jail/*) ;;
              *)
                echo "observability.ncclProfiles.values.dumpDir must be under /mnt/jail"
                exit 1
                ;;
            esac
            until [ -f /mnt/jail/etc/soperator-jail-populated ]; do
              echo "Waiting for /mnt/jail to be populated"
              sleep 5
            done
            install -d -m 0777 "$dump_dir"
        image: cr.eu-north1.nebius.cloud/soperator/busybox:latest
        name: init-nccl-profiles-dir
        securityContext:
          runAsGroup: 0
          runAsUser: 0
        volumeMounts:
          - name: jail
            mountPath: /mnt/jail

      {{- if $enableFileStorage }}
      - command:
          - sh
          - "-c"
          - 'chown -R 10001: /var/lib/otelcol-nccl-profiles'
        image: cr.eu-north1.nebius.cloud/soperator/busybox:latest
        name: init-fs
        securityContext:
          runAsGroup: 0
          runAsUser: 0
        volumeMounts:
          - name: varlibotelcol
            mountPath: /var/lib/otelcol-nccl-profiles
      {{- end }}

    resources:
      {{- toYaml $values.resources | nindent 6 }}

    useGOMEMLIMIT: {{ $useGoMemLimit }}

    {{- $featureGates := list }}
    {{- if $metricsEnabled }}
    {{- $featureGates = append $featureGates "-telemetry.UseLocalHostAsDefaultMetricsAddress" }}
    {{- end }}
    {{- if $deleteAfterReadEnabled }}
    {{- $featureGates = append $featureGates "filelog.allowFileDeletion" }}
    {{- end }}
    {{- if $featureGates }}
    command:
      extraArgs:
        - "--feature-gates={{ join "," $featureGates }}"
    {{- end }}

    ports:
      jaeger-compact:
        enabled: false
      jaeger-grpc:
        enabled: false
      jaeger-thrift:
        enabled: false
      metrics:
        {{- if $metricsEnabled }}
        enabled: true
        containerPort: 8889
        servicePort: 8889
        {{- else }}
        enabled: false
        {{- end }}
      otlp:
        enabled: false
      otlp-http:
        enabled: false
      zipkin:
        enabled: false

    podMonitor:
      {{- if $metricsEnabled }}
      enabled: true
      metricsEndpoints:
        - port: metrics
          interval: {{ $metrics.interval | default "30s" }}
          scrapeTimeout: {{ $metrics.scrapeTimeout | default "10s" }}
          relabelings:
            - sourceLabels: [ __meta_kubernetes_pod_name ]
              targetLabel: pod
            - sourceLabels: [ __meta_kubernetes_node_name ]
              targetLabel: node
            - replacement: otel-collector-nccl-profiles
              targetLabel: collector
      {{- else }}
      enabled: false
      {{- end }}

    config: {}
    configMap:
      create: false
      existingName: {{ .Values.observability.ncclProfiles.releaseName }}-agent
  {{- end }}

  valuesFrom:
    - kind: ConfigMap
      name: terraform-opentelemetry-collector-nccl-profiles
      optional: true
      valuesKey: values.yaml

    - kind: ConfigMap
      name: opentelemetry-collector-nccl-profiles
      optional: true
      valuesKey: values.yaml

{{- end -}}

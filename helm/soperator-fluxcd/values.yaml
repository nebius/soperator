observability:
  enabled: true
  clusterName: soperator
  clusterId: ""
  publicEndpointEnabled: true
  publicEndpointTokenKind: secret
  logsProjectId: default-project-id
  metricsProjectId: default-project-id
  region: eu-north1
  opentelemetry:
    enabled: true
    publicEndpoint: dns:///write.logging.eu-north1.nebius.cloud.:443
    namespace: logs-system
    extraHeaders: {}
    # These values are rendered as exporter sending_queue.batch settings.
    # The chart intentionally does not use the batch processor for collector pipelines.
    # https://github.com/open-telemetry/opentelemetry-collector-contrib/issues/44845#issuecomment-3877056774
    batch:
      timeout: 1s
      sendBatchSize: 2000
      sendBatchMaxSize: 5000
    # Exporter queue sizing shared by logs, events, and jail logs collectors.
    # queueSize is measured in telemetry items because exporter queues use sizer: items
    # (log records for logs/events), and it applies separately to each exporter.
    sendingQueue:
      queueSize: 30000
      numConsumers: 10
    metrics:
      enabled: true
      interval: 30s
      scrapeTimeout: 10s
    logs:
      version: 0.149.*
      interval: 15m
      timeout: 30m
      install:
        remediation:
          retries: 6
      upgrade:
        remediation:
          retries: 6
          remediateLastFailure: true
      values:
        enableFileStorage: true
        useGoMemLimit: true
        jailLogs:
          enabled: true
          pollInterval: 30s
          enableFileStorage: true
          useGoMemLimit: true
          deleteAfterRead:
            enabled: false
            # Nebius O11y agent fork option; not part of upstream filelogreceiver.
            # Files are deleted only after they have not been modified for at least this duration.
            minAge: 15m
          resources:
            requests:
              memory: 200Mi
              cpu: 100m
            limits:
              memory: 200Mi
        nodeLogs:
          enabled: true
          resources:
            requests:
              memory: 200Mi
              cpu: 100m
            limits:
              memory: 200Mi
        resources:
          requests:
            memory: 200Mi
            cpu: 100m
          limits:
            memory: 200Mi
      overrideValues: null
      driftDetection:
        mode: warn
    events:
      version: 0.149.*
      interval: 5m
      timeout: 5m
      install:
        remediation:
          retries: 3
      upgrade:
        remediation:
          retries: 3
          remediateLastFailure: true
      values:
        enableFileStorage: true
        useGoMemLimit: true
        resources:
          requests:
            memory: 128Mi
            cpu: 100m
          limits:
            memory: 128Mi
      overrideValues: null
      driftDetection:
        mode: warn
  prometheusOperator:
    enabled: true
    interval: 5m
    timeout: 5m
    version: 19.1.*
    namespace: monitoring-system
    driftDetection:
      mode: warn
  vmStack:
    enabled: true
    crds:
      interval: 5m
      timeout: 5m
      version: 0.10.1
      install:
        crds: CreateReplace
        remediation:
          retries: 3
      upgrade:
        crds: CreateReplace
        remediation:
          retries: 3
          remediateLastFailure: true
      driftDetection:
        mode: warn
    interval: 5m
    timeout: 30m
    version: 0.80.*
    namespace: monitoring-system
    releaseName: metrics
    install:
      crds: Skip
      remediation:
        retries: 6
    upgrade:
      crds: Skip
      remediation:
        retries: 6
        remediateLastFailure: true
    tsaTokenSidecar:
      enabled: true
      image:
        repository: cr.eu-north1.nebius.cloud/soperator-proxy-docker-io/alpine/curl
        tag: "8.19.0"
        pullPolicy: IfNotPresent
      tokenMountPath: /mnt/imds
      tokenFilePath: /mnt/imds/tsa-token
      resources: {}
    values:
      dashboardNamespaces:
        - soperator
        - soperator-system
        - gpu-operator
        - monitoring-system
        - logs-system
      grafanaIni:
        auth:
          disable_login_form: true
        auth.basic:
          enabled: false
        auth.anonymous:
          enabled: true
          org_name: Main Org.
          org_role: Admin
      vmagent:
        spec:
          extraArgs:
            promscrape.maxScrapeSize: "33554432"
            promscrape.dropOriginalLabels: "true"
            promscrape.streamParse: "true"
          externalLabels: {}
          remoteWriteSettings: {}
          remoteWrite:
            - url: http://vmsingle-metrics-victoria-metrics-k8s-stack.monitoring-system.svc.cluster.local.:8428/api/v1/write
          resources:
            requests:
              memory: 10Gi
              cpu: 5000m
            limits:
              memory: 10Gi
          extraEnvs: []
          volumeMounts: []
          volumes: []
      vmsingle:
        spec:
          extraArgs:
            dedup.minScrapeInterval: 30s
            maxLabelsPerTimeseries: "40"
            search.maxQueryLen: "18765"
            search.maxUniqueTimeseries: "500000"
          retentionPeriod: 30d
          storage:
            accessModes:
              - ReadWriteOnce
            resources:
              requests:
                storage: 30Gi
          resources:
            requests:
              memory: 2Gi
              cpu: 1000m
            limits:
              memory: 2Gi
      prometheusNodeExporter:
        enabled: true
        extraArgs: null
    overrideValues: null
    driftDetection:
      mode: warn
  vmLogs:
    enabled: true
    interval: 5m
    timeout: 5m
    version: 0.13.*
    namespace: logs-system
    releaseName: vm-logs
    install:
      crds: CreateReplace
      remediation:
        retries: 3
    upgrade:
      crds: CreateReplace
      remediation:
        retries: 3
        remediateLastFailure: true
    values:
      persistentVolume:
        enabled: true
        size: 30Gi
        accessMode: ReadWriteOnce
      resources:
        requests:
          memory: 2Gi
          cpu: 1000m
        limits:
          memory: 2Gi
    overrideValues: null
    driftDetection:
      mode: warn
  dcgmExporter:
    enabled: true
    interval: 5m
    timeout: 30m
    version: 4.0.2
    namespace: soperator
    releaseName: soperator-dcgm-exporter
    install:
      crds: CreateReplace
      remediation:
        retries: 6
    upgrade:
      crds: CreateReplace
      remediation:
        retries: 6
        remediateLastFailure: true
    values:
      hpcJobMapDir: /var/run/nebius/slurm
      validateToolkit: true
      resources:
        limits:
          memory: 128Mi
        requests:
          memory: 128Mi
          cpu: 100m
    driftDetection:
      mode: warn
  ncclProfiles:
    enabled: false
    interval: 5m
    timeout: 5m
    version:
      bedag: 2.0.0
      opentelemetryCollector: 0.149.*
    install:
      crds: Skip
      remediation:
        retries: 3
    upgrade:
      crds: Skip
      remediation:
        retries: 3
        remediateLastFailure: true
    driftDetection:
      mode: warn
    releaseName: opentelemetry-collector-nccl-profiles
    configMapOverrideValues: null
    collectorOverrideValues: null
    values:
      # or nodeLocal
      mode: shared
      resources:
        requests:
          memory: 200Mi
          cpu: 500m
        limits:
          memory: 1Gi
      useGoMemLimit: true
      nebiusO11yAgentVersion: 2.0.10
      metricsEndpoint: http://vmsingle-metrics-victoria-metrics-k8s-stack:8428/opentelemetry/v1/metrics
      metricsExporterTimeout: 15s
      # These values are rendered as exporter sending_queue.batch settings.
      # The chart intentionally does not use the batch processor for collector pipelines.
      batch:
        timeout: 1s
        sendBatchSize: 2000
        sendBatchMaxSize: 5000
      # Measured in metric data points because the exporter queue uses sizer: items.
      sendingQueue:
        queueSize: 30000
        numConsumers: 10
      metrics:
        enabled: true
        interval: 30s
        scrapeTimeout: 10s
      dumpDir: /mnt/jail/opt/soperator-outputs/nccl_profiles
      pollInterval: 30s
      exportLabels:
        slurmJobId: slurm_job_id
        slurmStepId: slurm_step_id
        hostnamePid: hostname_pid
      enableFileStorage: true
      deleteAfterRead:
        enabled: true
        # Nebius O11y agent fork option; not part of upstream filelogreceiver.
        # Files are deleted only after they have not been modified for at least this duration.
        minAge: 15m

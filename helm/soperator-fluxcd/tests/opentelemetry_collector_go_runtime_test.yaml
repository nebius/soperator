suite: test opentelemetry collector NCCL profiles Go runtime env
templates:
  - templates/opentelemetry-collector-nccl-profiles.yaml
tests:
  - it: should derive GOMAXPROCS and enable upstream GOMEMLIMIT for NCCL collector
    set:
      observability.enabled: true
      observability.ncclProfiles.enabled: true
      observability.ncclProfiles.values.resources:
        requests:
          cpu: "2"
          memory: 200Mi
        limits:
          memory: 500Gi
    documentSelector:
      path: metadata.name
      value: RELEASE-NAME-otelcol-nccl-profiles
    asserts:
      - contains:
          path: spec.values.extraEnvs
          content:
            name: GOMAXPROCS
            value: "2"
      - equal:
          path: spec.values.useGOMEMLIMIT
          value: true

  - it: should disable upstream GOMEMLIMIT when useGoMemLimit is false
    set:
      observability.enabled: true
      observability.ncclProfiles.enabled: true
      observability.ncclProfiles.values.useGoMemLimit: false
    documentSelector:
      path: metadata.name
      value: RELEASE-NAME-otelcol-nccl-profiles
    asserts:
      - contains:
          path: spec.values.extraEnvs
          content:
            name: GOMAXPROCS
            value: "1"
      - equal:
          path: spec.values.useGOMEMLIMIT
          value: false

suite: test vmagent edge cases
templates:
  - templates/vm-stack.yaml

set:
  observability:
    metricsProjectId: default-project-id

tests:
  - it: should handle null projectId gracefully
    set:
      observability:
        enabled: true
        vmStack:
          enabled: true
          publicEndpointEnabled: true
        metricsProjectId: null
    asserts:
      - hasDocuments:
          count: 1
      - equal:
          path: spec.values.vmagent.spec.remoteWriteSettings.label.container_id
          value: null
      - matchRegex:
          path: spec.values.vmagent.spec.remoteWrite[0].url
          pattern: ".*/projects//buckets.*"

  - it: should handle empty strings in projectId
    set:
      observability:
        enabled: true
        vmStack:
          enabled: true
          publicEndpointEnabled: true
      metricsProjectId: ""
    asserts:
      - hasDocuments:
          count: 1
      - equal:
          path: spec.values.vmagent.spec.remoteWriteSettings.label.container_id
          value: "default-project-id"

  - it: should handle complex nested custom values
    set:
      observability:
        enabled: true
        vmStack:
          enabled: true
          publicEndpointEnabled: true
          values:
            vmagent:
              spec:
                resources:
                  limits:
                    memory: "2Gi"
                    cpu: "1000m"
                  requests:
                    memory: "1Gi"
                    cpu: "500m"
                extraEnvs:
                  - name: "COMPLEX_CONFIG"
                    valueFrom:
                      configMapKeyRef:
                        name: "vmagent-config"
                        key: "config.yaml"
                  - name: "SECRET_TOKEN"
                    valueFrom:
                      secretKeyRef:
                        name: "vmagent-secrets"
                        key: "token"
                volumeMounts:
                  - name: "config-volume"
                    mountPath: "/etc/vmagent"
                    readOnly: true
                  - name: "cache-volume"
                    mountPath: "/tmp/cache"
                volumes:
                  - name: "config-volume"
                    configMap:
                      name: "vmagent-config"
                      defaultMode: 0644
                  - name: "cache-volume"
                    emptyDir:
                      sizeLimit: "1Gi"
                containers:
                  - name: "custom-sidecar"
                    image: "example/custom-sidecar:v1"
    asserts:
      - hasDocuments:
          count: 1
      - equal:
          path: spec.values.vmagent.spec.resources.limits.memory
          value: "2Gi"
      - equal:
          path: spec.values.vmagent.spec.resources.requests.cpu
          value: "500m"
      - lengthEqual:
          path: spec.values.vmagent.spec.extraEnvs
          count: 3
      - equal:
          path: spec.values.vmagent.spec.extraEnvs[1].valueFrom.configMapKeyRef.name
          value: "vmagent-config"
      - equal:
          path: spec.values.vmagent.spec.extraEnvs[2].valueFrom.secretKeyRef.key
          value: "token"
      - lengthEqual:
          path: spec.values.vmagent.spec.volumeMounts
          count: 3 # 2 custom + 1 tsa-token
      - lengthEqual:
          path: spec.values.vmagent.spec.volumes
          count: 3 # 2 custom + 1 tsa-token
      - lengthEqual:
          path: spec.values.vmagent.spec.containers
          count: 2 # 1 tsa-token refresher + 1 custom
      - equal:
          path: spec.values.vmagent.spec.containers[0].name
          value: "tsa-token-refresher"
      - equal:
          path: spec.values.vmagent.spec.containers[1].name
          value: "custom-sidecar"

  - it: should override default extraArgs correctly
    set:
      observability:
        enabled: true
        vmStack:
          enabled: true
          publicEndpointEnabled: true
          values:
            vmagent:
              spec:
                extraArgs:
                  "promscrape.dropOriginalLabels": "false" # Override default
                  "remoteWrite.rateLimit": "10" # Override default
                  "promscrape.maxScrapeSize": "67108864" # Override default
                  "custom.newArg": "newValue" # Add new
    asserts:
      - hasDocuments:
          count: 1
      - equal:
          path: spec.values.vmagent.spec.extraArgs["promscrape.dropOriginalLabels"]
          value: "false"
      - equal:
          path: spec.values.vmagent.spec.extraArgs["remoteWrite.rateLimit"]
          value: "10"
      - equal:
          path: spec.values.vmagent.spec.extraArgs["promscrape.maxScrapeSize"]
          value: "67108864"
      - equal:
          path: spec.values.vmagent.spec.extraArgs["custom.newArg"]
          value: "newValue"
      # Ensure other defaults are still present
      - equal:
          path: spec.values.vmagent.spec.extraArgs["promscrape.streamParse"]
          value: "true"
      - equal:
          path: spec.values.vmagent.spec.extraArgs["remoteWrite.bearerTokenFile"]
          value: "/mnt/imds/tsa-token"

  - it: should handle special characters in projectId
    set:
      observability:
        enabled: true
        vmStack:
          enabled: true
          publicEndpointEnabled: true
        metricsProjectId: "test-project_123.dev"
    asserts:
      - hasDocuments:
          count: 1
      - equal:
          path: spec.values.vmagent.spec.remoteWriteSettings.label.container_id
          value: "test-project_123.dev"
      - matchRegex:
          path: spec.values.vmagent.spec.remoteWrite[0].url
          pattern: "[.]*.test-project_123.dev.[.]*"

  - it: should validate template conditionals structure
    set:
      observability:
        enabled: true
        vmStack:
          enabled: true
          publicEndpointEnabled: true
          values:
            vmagent:
              spec: {} # Empty spec to test conditional blocks
    asserts:
      - hasDocuments:
          count: 1
      # Should still have default values for public endpoint
      - exists:
          path: spec.values.vmagent.spec.remoteWriteSettings
      - exists:
          path: spec.values.vmagent.spec.remoteWrite
      - exists:
          path: spec.values.vmagent.spec.extraArgs
      - exists:
          path: spec.values.vmagent.spec.volumeMounts
      - exists:
          path: spec.values.vmagent.spec.volumes
      - exists:
          path: spec.values.vmagent.spec.containers
      - equal:
          path: spec.values.vmagent.spec.hostNetwork
          value: true
      - equal:
          path: spec.values.vmagent.spec.dnsPolicy
          value: "ClusterFirstWithHostNet"
      - exists:
          path: spec.values.vmagent.spec.resources
      # Should not have these sections when not provided
      - notExists:
          path: spec.values.vmagent.spec.extraEnv

  - it: should handle boolean and numeric values in extraArgs
    set:
      observability:
        enabled: true
        publicEndpointEnabled: false
        vmStack:
          enabled: true
          values:
            vmagent:
              spec:
                extraArgs:
                  "flag.enabled": true
                  "flag.disabled": false
                  "numeric.value": 42
                  "float.value": 3.14
                  "string.value": "test"
    asserts:
      - hasDocuments:
          count: 1
      - equal:
          path: spec.values.vmagent.spec.extraArgs["flag.enabled"]
          value: true
      - equal:
          path: spec.values.vmagent.spec.extraArgs["flag.disabled"]
          value: false
      - equal:
          path: spec.values.vmagent.spec.extraArgs["numeric.value"]
          value: 42
      - equal:
          path: spec.values.vmagent.spec.extraArgs["float.value"]
          value: 3.14
      - equal:
          path: spec.values.vmagent.spec.extraArgs["string.value"]
          value: "test"

  - it: should handle no externalLabels
    set:
      observability:
        enabled: true
        vmStack:
          enabled: true
          publicEndpointEnabled: true
    asserts:
      - hasDocuments:
          count: 1
      - notExists:
          path: spec.values.vmagent.spec.externalLabels

  - it: should handle externalLabels
    set:
      observability:
        enabled: true
        vmStack:
          enabled: true
          publicEndpointEnabled: true
          values:
            vmagent:
              spec:
                externalLabels:
                  a: b
                  foo: bar
    asserts:
      - hasDocuments:
          count: 1
      - equal:
          path: spec.values.vmagent.spec.externalLabels["a"]
          value: b
      - equal:
          path: spec.values.vmagent.spec.externalLabels["foo"]
          value: bar
      - equal:
          path: spec.values.vmagent.spec.remoteWriteSettings.label["a"]
          value: b
      - equal:
          path: spec.values.vmagent.spec.remoteWriteSettings.label["foo"]
          value: bar

  - it: should merge custom remoteWrite with default when publicEndpointEnabled is true
    set:
      observability:
        enabled: true
        vmStack:
          enabled: true
          publicEndpointEnabled: true
          values:
            vmagent:
              spec:
                remoteWrite:
                  - url: "https://custom-endpoint.com/write"
                    headers:
                      Authorization: "Bearer custom-token"
                  - url: "https://secondary-endpoint.com/write"
                    writeRelabelConfigs:
                      - sourceLabels: [__name__]
                        regex: "custom_.*"
                        action: keep
    asserts:
      - hasDocuments:
          count: 1
      # Should have both default and custom remoteWrite entries
      - lengthEqual:
          path: spec.values.vmagent.spec.remoteWrite
          count: 3 # 1 default + 2 custom
      # Check default endpoint (should be first)
      - equal:
          path: spec.values.vmagent.spec.remoteWrite[0].url
          value: "https://write.monitoring.eu-north1.nebius.cloud/projects/default-project-id/buckets/soperator/prometheus"
      - exists:
          path: spec.values.vmagent.spec.remoteWrite[0].inlineUrlRelabelConfig
      # Check first custom endpoint
      - equal:
          path: spec.values.vmagent.spec.remoteWrite[1].url
          value: "https://custom-endpoint.com/write"
      - equal:
          path: spec.values.vmagent.spec.remoteWrite[1].headers.Authorization
          value: "Bearer custom-token"
      # Check second custom endpoint
      - equal:
          path: spec.values.vmagent.spec.remoteWrite[2].url
          value: "https://secondary-endpoint.com/write"
      - equal:
          path: spec.values.vmagent.spec.remoteWrite[2].writeRelabelConfigs[0].action
          value: "keep"

  - it: should merge custom volumeMounts and volumes with defaults when publicEndpointEnabled is true
    set:
      observability:
        enabled: true
        vmStack:
          enabled: true
          publicEndpointEnabled: true
          values:
            vmagent:
              spec:
                volumeMounts:
                  - name: "custom-config"
                    mountPath: "/etc/custom-config"
                    readOnly: true
                  - name: "data-volume"
                    mountPath: "/data"
                volumes:
                  - name: "custom-config"
                    configMap:
                      name: "vmagent-custom-config"
                  - name: "data-volume"
                    persistentVolumeClaim:
                      claimName: "vmagent-data"
    asserts:
      - hasDocuments:
          count: 1
      # Should have both default and custom volumeMounts
      - lengthEqual:
          path: spec.values.vmagent.spec.volumeMounts
          count: 3 # 1 default tsa-token + 2 custom
      # Check default tsa-token mount
      - equal:
          path: spec.values.vmagent.spec.volumeMounts[0].name
          value: "cloud-metadata"
      - equal:
          path: spec.values.vmagent.spec.volumeMounts[0].mountPath
          value: "/mnt/imds"
      - equal:
          path: spec.values.vmagent.spec.volumeMounts[0].readOnly
          value: true
      # Check custom mounts
      - equal:
          path: spec.values.vmagent.spec.volumeMounts[1].name
          value: "custom-config"
      - equal:
          path: spec.values.vmagent.spec.volumeMounts[1].mountPath
          value: "/etc/custom-config"
      - equal:
          path: spec.values.vmagent.spec.volumeMounts[2].name
          value: "data-volume"
      - equal:
          path: spec.values.vmagent.spec.volumeMounts[2].mountPath
          value: "/data"
      # Should have both default and custom volumes
      - lengthEqual:
          path: spec.values.vmagent.spec.volumes
          count: 3 # 1 default tsa-token + 2 custom
      # Check default tsa-token volume
      - equal:
          path: spec.values.vmagent.spec.volumes[0].name
          value: "cloud-metadata"
      - exists:
          path: spec.values.vmagent.spec.volumes[0].emptyDir
      - notExists:
          path: spec.values.vmagent.spec.volumes[0].hostPath
      # Check custom volumes
      - equal:
          path: spec.values.vmagent.spec.volumes[1].name
          value: "custom-config"
      - equal:
          path: spec.values.vmagent.spec.volumes[1].configMap.name
          value: "vmagent-custom-config"
      - equal:
          path: spec.values.vmagent.spec.volumes[2].name
          value: "data-volume"
      - equal:
          path: spec.values.vmagent.spec.volumes[2].persistentVolumeClaim.claimName
          value: "vmagent-data"

  - it: should handle edge case with empty custom arrays when publicEndpointEnabled is true
    set:
      observability:
        enabled: true
        vmStack:
          enabled: true
          publicEndpointEnabled: true
          values:
            vmagent:
              spec:
                remoteWrite: []
                extraEnv: []
                volumeMounts: []
                volumes: []
    asserts:
      - hasDocuments:
          count: 1
      # Should still have defaults when custom arrays are empty
      - lengthEqual:
          path: spec.values.vmagent.spec.remoteWrite
          count: 1 # Only default
      - equal:
          path: spec.values.vmagent.spec.remoteWrite[0].url
          value: "https://write.monitoring.eu-north1.nebius.cloud/projects/default-project-id/buckets/soperator/prometheus"
      # Should have default volumeMounts and volumes
      - lengthEqual:
          path: spec.values.vmagent.spec.volumeMounts
          count: 1 # Only default tsa-token
      - equal:
          path: spec.values.vmagent.spec.volumeMounts[0].name
          value: "cloud-metadata"
      - lengthEqual:
          path: spec.values.vmagent.spec.volumes
          count: 1 # Only default tsa-token
      - equal:
          path: spec.values.vmagent.spec.volumes[0].name
          value: "cloud-metadata"
      - exists:
          path: spec.values.vmagent.spec.containers[0]
      - equal:
          path: spec.values.vmagent.spec.containers[0].name
          value: "tsa-token-refresher"
      - equal:
          path: spec.values.vmagent.spec.containers[0].image
          value: "cr.eu-north1.nebius.cloud/soperator-proxy-docker-io/alpine/curl:8.19.0"
      - lengthEqual:
          path: spec.values.vmagent.spec.containers[0].env
          count: 1
      - equal:
          path: spec.values.vmagent.spec.containers[0].env[0].name
          value: "TSA_TOKEN_PATH"
      # Should not have extraEnv when empty
      - notExists:
          path: spec.values.vmagent.spec.extraEnv

  - it: should render configurable tsa-token IMDS sidecar when publicEndpointEnabled is true
    set:
      observability:
        enabled: true
        publicEndpointEnabled: true
        vmStack:
          enabled: true
          tsaTokenSidecar:
            image:
              repository: "example.com/metadata-token"
              tag: "v2"
              pullPolicy: Always
            imdsBaseUrl: "http://metadata.test.internal"
            tokenMountPath: "/var/run/cloud-metadata"
            tokenFilePath: "/var/run/cloud-metadata/tsa-token"
            expiryFilePath: "/var/run/cloud-metadata/tsa-token.expires_at"
            refreshSafetyMarginSeconds: 1200
            resources:
              requests:
                cpu: 10m
                memory: 32Mi
    asserts:
      - hasDocuments:
          count: 1
      - equal:
          path: spec.values.vmagent.spec.extraArgs["remoteWrite.bearerTokenFile"]
          value: "/var/run/cloud-metadata/tsa-token"
      - equal:
          path: spec.values.vmagent.spec.volumeMounts[0].mountPath
          value: "/var/run/cloud-metadata"
      - equal:
          path: spec.values.vmagent.spec.containers[0].image
          value: "example.com/metadata-token:v2"
      - equal:
          path: spec.values.vmagent.spec.containers[0].imagePullPolicy
          value: "Always"
      - equal:
          path: spec.values.vmagent.spec.containers[0].env[0].value
          value: "/var/run/cloud-metadata/tsa-token"
      - equal:
          path: spec.values.vmagent.spec.containers[0].env[1].value
          value: "/var/run/cloud-metadata/tsa-token.expires_at"
      - equal:
          path: spec.values.vmagent.spec.containers[0].env[2].value
          value: "http://metadata.test.internal"
      - equal:
          path: spec.values.vmagent.spec.containers[0].env[3].value
          value: "1200"
      - equal:
          path: spec.values.vmagent.spec.containers[0].env[3].name
          value: "TSA_TOKEN_REFRESH_SAFETY_MARGIN_SECONDS"
      - lengthEqual:
          path: spec.values.vmagent.spec.containers[0].env
          count: 4
      - equal:
          path: spec.values.vmagent.spec.containers[0].volumeMounts[0].mountPath
          value: "/var/run/cloud-metadata"
      - equal:
          path: spec.values.vmagent.spec.containers[0].resources.requests.cpu
          value: "10m"
      - equal:
          path: spec.values.vmagent.spec.hostNetwork
          value: true
      - equal:
          path: spec.values.vmagent.spec.dnsPolicy
          value: "ClusterFirstWithHostNet"

  - it: should not render tsa-token sidecar when publicEndpointEnabled is false
    set:
      observability:
        enabled: true
        publicEndpointEnabled: false
        vmStack:
          enabled: true
    asserts:
      - hasDocuments:
          count: 1
      - notExists:
          path: spec.values.vmagent.spec.containers
      - notExists:
          path: spec.values.vmagent.spec.hostNetwork

  - it: should not set bearer token file when tsa-token sidecar is disabled
    set:
      observability:
        enabled: true
        publicEndpointEnabled: true
        vmStack:
          enabled: true
          tsaTokenSidecar:
            enabled: false
    asserts:
      - hasDocuments:
          count: 1
      - notExists:
          path: spec.values.vmagent.spec.containers
      - notExists:
          path: spec.values.vmagent.spec.volumeMounts[0]
      - notExists:
          path: spec.values.vmagent.spec.volumes[0]
      - notExists:
          path: spec.values.vmagent.spec.extraArgs["remoteWrite.bearerTokenFile"]
      - equal:
          path: spec.values.vmagent.spec.extraArgs["remoteWrite.flushInterval"]
          value: "2s"

suite: test kube-state-metrics scrape config
templates:
  - templates/vm-stack.yaml
tests:
  - it: should not set kube-state-metrics scrape size by default
    asserts:
      - hasDocuments:
          count: 1
      - equal:
          path: spec.values.vmagent.spec.extraArgs["promscrape.maxScrapeSize"]
          value: "33554432"
      - equal:
          path: spec.values.kube-state-metrics.vmScrape.spec.endpoints[0].port
          value: http
      - notExists:
          path: spec.values.kube-state-metrics.vmScrape.spec.endpoints[0].max_scrape_size
      - equal:
          path: spec.values.kube-state-metrics.vmScrape.spec.endpoints[1].port
          value: metrics
      - notExists:
          path: spec.values.kube-state-metrics.vmScrape.spec.endpoints[1].max_scrape_size

  - it: should allow overriding kube-state-metrics scrape size
    set:
      observability.vmStack.values.kubeStateMetrics.maxScrapeSize: "150554432"
    asserts:
      - hasDocuments:
          count: 1
      - equal:
          path: spec.values.kube-state-metrics.vmScrape.spec.endpoints[0].max_scrape_size
          value: "150554432"

  - it: should not set kube-state-metrics resources by default
    asserts:
      - hasDocuments:
          count: 1
      - notExists:
          path: spec.values.kube-state-metrics.resources

  - it: should pin kube-state-metrics to system nodes
    asserts:
      - hasDocuments:
          count: 1
      - equal:
          path: spec.values.kube-state-metrics.affinity.nodeAffinity.requiredDuringSchedulingIgnoredDuringExecution.nodeSelectorTerms[0].matchExpressions[0].key
          value: slurm.nebius.ai/nodeset
      - equal:
          path: spec.values.kube-state-metrics.affinity.nodeAffinity.requiredDuringSchedulingIgnoredDuringExecution.nodeSelectorTerms[0].matchExpressions[0].values[0]
          value: system

  - it: should pass kube-state-metrics resources through
    set:
      observability.vmStack.values.kubeStateMetrics.resources:
        requests:
          cpu: 200m
          memory: 1024Mi
        limits:
          memory: 2048Mi
    asserts:
      - hasDocuments:
          count: 1
      - equal:
          path: spec.values.kube-state-metrics.resources.requests.cpu
          value: 200m
      - equal:
          path: spec.values.kube-state-metrics.resources.requests.memory
          value: 1024Mi
      - equal:
          path: spec.values.kube-state-metrics.resources.limits.memory
          value: 2048Mi

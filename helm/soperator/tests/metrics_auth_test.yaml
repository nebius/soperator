suite: test controller-runtime protected metrics
capabilities:
  apiVersions:
    - monitoring.coreos.com/v1/PodMonitor
release:
  name: test-soperator
  namespace: soperator-system
templates:
  - templates/deployment.yaml
  - templates/metrics-auth-rbac.yaml
  - templates/node-exporter-podmonitor.yaml

tests:
  - it: should expose secure metrics from the manager without a sidecar
    template: templates/deployment.yaml
    asserts:
      - equal:
          path: spec.template.spec.containers[0].name
          value: manager
      - hasDocuments:
          count: 1
      - lengthEqual:
          path: spec.template.spec.containers
          count: 1
      - contains:
          path: spec.template.spec.containers[0].args
          content: --metrics-bind-address=:8443
      - contains:
          path: spec.template.spec.containers[0].args
          content: --metrics-secure=true
      - contains:
          path: spec.template.spec.containers[0].ports
          content:
            containerPort: 8443
            name: https
            protocol: TCP

  - it: should grant the manager auth review permissions for protected metrics
    template: templates/metrics-auth-rbac.yaml
    asserts:
      - hasDocuments:
          count: 2
      - isKind:
          of: ClusterRole
        documentIndex: 0
      - contains:
          path: rules
          content:
            apiGroups:
              - authentication.k8s.io
            resources:
              - tokenreviews
            verbs:
              - create
        documentIndex: 0
      - contains:
          path: rules
          content:
            apiGroups:
              - authorization.k8s.io
            resources:
              - subjectaccessreviews
            verbs:
              - create
        documentIndex: 0
      - isKind:
          of: ClusterRoleBinding
        documentIndex: 1
      - equal:
          path: subjects[0].name
          value: test-soperator-manager
        documentIndex: 1

  - it: should add node-exporter sidecar when enabled
    template: templates/deployment.yaml
    set:
      nodeExporter:
        enabled: true
    asserts:
      - lengthEqual:
          path: spec.template.spec.containers
          count: 1
      - lengthEqual:
          path: spec.template.spec.initContainers
          count: 1
      - equal:
          path: spec.template.metadata.labels["slurm.nebius.ai/pod-node-exporter"]
          value: "true"
      - equal:
          path: spec.template.spec.initContainers[0].name
          value: pod-node-exporter
      - equal:
          path: spec.template.spec.initContainers[0].restartPolicy
          value: Always
      - contains:
          path: spec.template.spec.initContainers[0].args
          content: --collector.netdev
      - contains:
          path: spec.template.spec.initContainers[0].args
          content: --web.listen-address=:9100

  - it: should render node-exporter PodMonitor when enabled
    template: templates/node-exporter-podmonitor.yaml
    set:
      nodeExporter:
        enabled: true
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: PodMonitor
      - equal:
          path: spec.selector.matchLabels["slurm.nebius.ai/pod-node-exporter"]
          value: "true"
      - equal:
          path: spec.podMetricsEndpoints[0].port
          value: node-exporter

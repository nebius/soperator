namespace: soperator

enroot:
  # Store Enroot cache/data/runtime under dedicated image storage disks.
  # When false, data/runtime use Enroot defaults and cache uses shared /var/cache;
  # use that together with plugStackConfig.pyxis.useSquashfuse.
  useDedicatedImageStorage: true

configMaps:
  supervisord:
    enabled: true
    name: custom-supervisord-config
    files:
      - supervisord.conf
  motd:
    enabled: true
    name: motd-nebius-o11y
    files:
      - 95-nebius-o11y
  imageStorage:
    enabled: true
    name: image-storage
    files:
      - daemon.json
      - enroot.conf

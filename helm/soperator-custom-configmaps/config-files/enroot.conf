{{- if .Values.enroot.useTmpfsStorage -}}
ENROOT_CACHE_PATH          /mnt/memory/enroot/cache
ENROOT_DATA_PATH           /mnt/memory/enroot/data
ENROOT_RUNTIME_PATH        /mnt/memory/enroot/runtime
{{ else -}}
ENROOT_CACHE_PATH          /mnt/image-storage/enroot/cache
ENROOT_DATA_PATH           /mnt/image-storage/enroot/data
ENROOT_RUNTIME_PATH        /mnt/image-storage/enroot/runtime
{{ end -}}
ENROOT_NATIVE_OVERLAYFS    yes

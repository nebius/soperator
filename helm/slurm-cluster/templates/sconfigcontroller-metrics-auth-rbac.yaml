{{- if .Values.sConfigController.rbac.create -}}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "slurm-cluster.name" . }}-sconfigcontroller-metrics-auth
  labels:
    {{- include "slurm-cluster.labels" . | nindent 4 }}
    app.kubernetes.io/component: sconfigcontroller-metrics-auth
rules:
  - apiGroups:
      - authentication.k8s.io
    resources:
      - tokenreviews
    verbs:
      - create
  - apiGroups:
      - authorization.k8s.io
    resources:
      - subjectaccessreviews
    verbs:
      - create
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "slurm-cluster.name" . }}-sconfigcontroller-metrics-auth
  labels:
    {{- include "slurm-cluster.labels" . | nindent 4 }}
    app.kubernetes.io/component: sconfigcontroller-metrics-auth
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "slurm-cluster.name" . }}-sconfigcontroller-metrics-auth
subjects:
  - kind: ServiceAccount
    name: {{ include "slurm-cluster.sconfigcontroller.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}

suite: test slurmJobSpec structure
templates:
  - templates/active-checks.yaml

tests:
  - it: should render gpu-checks active check
    documentSelector:
      path: metadata.name
      value: soperator-gpu-checks
    asserts:
      - isKind:
          of: ActiveCheck
      - equal:
          path: spec.checkType
          value: slurmJob
      - equal:
          path: spec.runAfterCreation
          value: true
      - equal:
          path: spec.suspend
          value: false
      - contains:
          path: spec.dependsOn
          content: soperator-manage-jail-state
      - matchRegex:
          path: spec.slurmJobSpec.sbatchScript
          pattern: 'health-checker run'
      - matchRegex:
          path: spec.slurmJobSpec.sbatchScript
          pattern: 'Running GPU checks'

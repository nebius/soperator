{{- $root := . -}}
{{- $managedBySlurmCluster := .Values.clusterInitialization.managedBySlurmCluster -}}
{{- $legacyInitializationChecks := list "create-user-soperatorchecks" "create-user-nebius" "manage-jail-state" -}}
{{- range $name, $check := .Values.checks }}
{{- $legacyInitializationCheck := has $name $legacyInitializationChecks -}}
{{- if and $check.enabled (not (and $managedBySlurmCluster $legacyInitializationCheck)) }}
{{- include "soperator-activechecks.checkReactionsConflict" (dict "name" $name "vals" $root.Values) -}}
---
apiVersion: slurm.nebius.ai/v1alpha1
kind: ActiveCheck
metadata:
  name: {{ printf "%s-%s" $root.Values.slurmClusterRefName $name | quote }}
spec:
  checkType: {{ $check.checkType | quote }}
  name: {{ printf "%s-%s" $root.Values.slurmClusterRefName $name | quote }}
  {{- $dependsOn := list -}}
  {{- range $dependency := $check.dependsOn -}}
    {{- if not (and $managedBySlurmCluster (has $dependency $legacyInitializationChecks)) -}}
      {{- $dependsOn = append $dependsOn $dependency -}}
    {{- end -}}
  {{- end -}}
  {{- with $dependsOn }}
  dependsOn:
    {{- range . }}
    - {{ printf "%s-%s" $root.Values.slurmClusterRefName . | quote }}
    {{- end }}
  {{- end }}
  slurmClusterRefName: {{ $root.Values.slurmClusterRefName | quote }}
  {{- with $check.schedule }}
  schedule: {{ . | quote }}
  {{- end }}
  {{- with $check.successfulJobsHistoryLimit }}
  successfulJobsHistoryLimit: {{ . }}
  {{- end }}
  {{- with $check.failedJobsHistoryLimit }}
  failedJobsHistoryLimit: {{ . }}
  {{- end }}
  hostUsers: {{ include "soperator-activechecks.hostUsers" $root }}
  suspend: {{ default false $check.suspend }}
  activeDeadlineSeconds: {{ default 1800 $check.activeDeadlineSeconds }}
  runAfterCreation: {{ default false $check.runAfterCreation }}
  {{- $nodeSelector := $root.Values.nodeSelector }}
  {{- if hasKey $check "nodeSelector" }}
    {{- $nodeSelector = $check.nodeSelector }}
  {{- end }}
  {{- with $nodeSelector }}
  nodeSelector:
{{ toYaml . | indent 4 }}
  {{- end }}
  {{- $affinity := $root.Values.affinity }}
  {{- if hasKey $check "affinity" }}
    {{- $affinity = $check.affinity }}
  {{- end }}
  {{- with $affinity }}
  affinity:
{{ toYaml . | indent 4 }}
  {{- end }}
  {{- $tolerations := $root.Values.tolerations }}
  {{- if hasKey $check "tolerations" }}
    {{- $tolerations = $check.tolerations }}
  {{- end }}
  {{- with $tolerations }}
  tolerations:
{{ toYaml . | indent 4 }}
  {{- end }}
  {{- if eq $check.checkType "slurmJob" }}
  slurmJobSpec:
{{ include "soperator-activechecks.slurmJobSpec" (dict "check" $check "ctx" $root) | indent 4 }}
  {{- else if eq $check.checkType "k8sJob" }}
  k8sJobSpec:
{{ include "soperator-activechecks.k8sJobSpec" (dict "check" $check "ctx" $root) | indent 4 }}
  {{- end }}
  {{- with $check.successReactions }}
  successReactions:
{{ toYaml . | indent 4 }}
  {{- end }}
  {{- with $check.failureReactions }}
  failureReactions:
{{ toYaml . | indent 4 }}
  {{- end }}
{{- end }}
{{- println "" }}
{{- end }}

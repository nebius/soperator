slurmClusterRefName: "soperator"
clusterInitialization:
  # Set to true once cluster initialization is handled by the slurm-cluster chart.
  # This suppresses the legacy initialization ActiveChecks and their dependencies.
  managedBySlurmCluster: false
nodeSelector: {}
affinity: {}
tolerations: []
# hostUsers controls spec.hostUsers on ActiveCheck pods:
#   true  → pods share the host user namespace
#   false → pods do NOT share the host user namespace
# When not set (null), the value is auto-detected from the Kubernetes version:
#   < 1.33  → false (do NOT share the host user namespace; user namespaces not stable)
#   >= 1.33 → true  (share the host user namespace)
# hostUsers: null
# CUDA version used for active check image selection and for managing jail state
cudaVersion: 12.9.0
# Flat override: if non-empty, takes precedence over ncclTestsVersions map.
ncclTestsVersion: ""
# Per-CUDA default NCCL tests versions.
# Source of truth: https://github.com/nebius/ml-containers/blob/main/ansible/roles/nccl-tests/defaults/main.yml
# Update this map together with activeCheckImageTags when adding new CUDA versions.
ncclTestsVersions:
  "12.9.0": "2.17.9"
  "13.0.2": "2.17.9"
jobContainer:
  env:
    - name: "K8S_POD_NAME"
      valueFrom:
        fieldRef:
          fieldPath: "metadata.name"
    - name: "K8S_POD_NAMESPACE"
      valueFrom:
        fieldRef:
          fieldPath: "metadata.namespace"
    - name: "SNCCLD_ENABLED"
      value: "false"
  volumeMounts:
    - mountPath: "/mnt/jail"
      name: "jail"
  volumes:
    - name: "jail"
      persistentVolumeClaim:
        claimName: "jail-pvc"
images:
  slurmJob: "cr.eu-north1.nebius.cloud/soperator/slurm_check_job:4.1.5-slurm25.11.5"
  k8sJob: "cr.eu-north1.nebius.cloud/soperator/k8s_check_job:4.1.5-slurm25.11.5"
  munge: "cr.eu-north1.nebius.cloud/soperator/munge:4.1.5-slurm25.11.5"
  sansible: "cr.eu-north1.nebius.cloud/soperator/sansible:4.1.5-slurm25.11.5"
  activeCheckImageRepository: "cr.eu-north1.nebius.cloud#ml-containers/training_diag"
  activeCheckImageTags:
    # Image training_diag from PR https://github.com/nebius/ml-containers/pull/90
    "12.9.0": "12.9.0-ubuntu24.04-20260624090429"
    # Image training_diag from PR https://github.com/nebius/ml-containers/pull/92
    "13.0.2": "13.0.2-ubuntu24.04-20260709140028"
# Optional override in Pyxis ("reg#repo:tag") format.
activeCheckImage: ""
slurmJob:
  # Slurm consumes this as SBATCH_GPUS_PER_NODE for GPU ActiveChecks.
  gpusPerNode: "8"
checks:
  gpu-checks:
    enabled: true
    checkType: "slurmJob"
    dependsOn:
      - "manage-jail-state"
      - "wait-for-soperatorchecks-srun-ready"
      - "wait-for-topology"
    schedule: "0 0,12 * * *"
    suspend: false
    runAfterCreation: true
    slurmJobSpec:
      sbatchScriptFile: "scripts/gpu-checks.sh"
      eachWorkerJobs: true
      maxNumberOfJobs: 200
      jobContainer:
        extraEnv:
          - name: "SBATCH_GPUS_PER_NODE"
            value: "{{ .Values.slurmJob.gpusPerNode }}"
    failureReactions:
      drainSlurmNode:
        drainReasonPrefix: "[node_problem]"
  all-reduce-perf-nccl-in-docker:
    enabled: true
    checkType: "slurmJob"
    dependsOn:
      - "manage-jail-state"
      - "wait-for-soperatorchecks-srun-ready"
      - "wait-for-topology"
      - "prepull-container-image"
    suspend: true
    runAfterCreation: true
    slurmJobSpec:
      sbatchScriptFile: "scripts/all-reduce-perf-nccl-in-docker.sh"
      eachWorkerJobs: true
      maxNumberOfJobs: 200
      jobContainer:
        extraEnv:
          - name: "SBATCH_GPUS_PER_NODE"
            value: "{{ .Values.slurmJob.gpusPerNode }}"
    failureReactions:
      drainSlurmNode:
        drainReasonPrefix: "[node_problem]"
  dcgmi-diag-r3:
    enabled: false
    checkType: "slurmJob"
    dependsOn:
      - "manage-jail-state"
      - "wait-for-soperatorchecks-srun-ready"
      - "wait-for-topology"
    suspend: true
    runAfterCreation: false
    slurmJobSpec:
      sbatchScriptFile: "scripts/dcgmi-diag-r3.sh"
      eachWorkerJobs: true
      jobContainer:
        extraEnv:
          - name: "SBATCH_GPUS_PER_NODE"
            value: "{{ .Values.slurmJob.gpusPerNode }}"
    failureReactions:
      drainSlurmNode:
        drainReasonPrefix: "[node_problem]"
  ensure-healthy-nodes:
    enabled: true
    checkType: "slurmJob"
    dependsOn:
      - "all-reduce-perf-nccl-in-docker"
      - "gpu-checks"
      - "manage-jail-state"
      - "wait-for-soperatorchecks-srun-ready"
      - "wait-for-topology"
    suspend: true
    runAfterCreation: true
    slurmJobSpec:
      sbatchScriptFile: "scripts/ensure-healthy-nodes.sh"
  ib-gpu-perf:
    enabled: true
    checkType: "slurmJob"
    dependsOn:
      - "manage-jail-state"
      - "wait-for-soperatorchecks-srun-ready"
      - "wait-for-topology"
      - "prepull-container-image"
    schedule: "55 1-21/4 * * *"
    suspend: false
    runAfterCreation: true
    slurmJobSpec:
      sbatchScriptFile: "scripts/ib-gpu-perf.sh"
      eachWorkerJobs: true
      maxNumberOfJobs: 200
      jobContainer:
        extraEnv:
          - name: "SBATCH_GPUS_PER_NODE"
            value: "{{ .Values.slurmJob.gpusPerNode }}"
    failureReactions:
      commentSlurmNode:
        commentPrefix: "[node_problem]"
  ssh-check:
    enabled: true
    checkType: "k8sJob"
    dependsOn:
      - "create-user-soperatorchecks"
    suspend: true
    runAfterCreation: true
    k8sJobSpec:
      scriptFile: "scripts/ssh-check.sh"
      jobContainer:
        appArmorProfile: unconfined
        env:
          - name: "NUM_OF_LOGIN_NODES"
            value: "2"
  create-user-soperatorchecks:
    enabled: true
    checkType: "k8sJob"
    suspend: true
    runAfterCreation: true
    k8sJobSpec:
      scriptFile: "scripts/create-user-soperatorchecks.sh"
  create-user-nebius:
    enabled: true
    checkType: "k8sJob"
    dependsOn:
      - "create-user-soperatorchecks"
    suspend: true
    runAfterCreation: true
    k8sJobSpec:
      scriptFile: "scripts/create-user.sh"
      jobContainer:
        env:
          - name: "USER_NAME"
            value: "nebius"
  enroot-cleanup:
    enabled: true
    checkType: "slurmJob"
    dependsOn:
      - "manage-jail-state"
      - "wait-for-soperatorchecks-srun-ready"
    schedule: "10 8-20/12 * * *"
    suspend: false
    runAfterCreation: false
    slurmJobSpec:
      sbatchScriptFile: "scripts/enroot-cleanup.sh"
      eachWorkerJobs: true
  prepull-container-image:
    enabled: true
    checkType: "slurmJob"
    dependsOn:
      - "manage-jail-state"
      - "wait-for-soperatorchecks-srun-ready"
      - "wait-for-topology"
    suspend: true
    runAfterCreation: true
    slurmJobSpec:
      sbatchScriptFile: "scripts/prepull-container-image.sh"
      jobContainer:
        extraEnv:
          - name: "SBATCH_GPUS_PER_NODE"
            value: "{{ .Values.slurmJob.gpusPerNode }}"
  soperator-outputs-logs-cleaner:
    enabled: true
    checkType: "k8sJob"
    schedule: "40 */1 * * *"
    suspend: false
    runAfterCreation: false
    k8sJobSpec:
      scriptFile: "scripts/soperator-outputs-logs-cleaner.sh"
      jobContainer:
        appArmorProfile: unconfined
        env:
          - name: "SNCCLPRECON_DUMP_DIR"
            value: "/opt/soperator-outputs/nccl_profiles"
  manage-jail-state:
    enabled: true
    checkType: "k8sJob"
    dependsOn:
      - "create-user-soperatorchecks"
    suspend: true
    runAfterCreation: true
    activeDeadlineSeconds: 3600
    k8sJobSpec:
      jobContainer:
        appArmorProfile: unconfined
        workingDir: /opt/ansible
        image: "{{ .Values.images.sansible }}"
        command: ["/opt/bin/sansible_entrypoint.sh"]
        args:
          - ansible-playbook
          - -i
          - inventory/
          - -c
          - local
          - run.yml
          - -t
          - run-all-upgrade
          - --diff
  manage-jail-state-force:
    enabled: true
    checkType: "k8sJob"
    dependsOn:
      - "create-user-soperatorchecks"
    suspend: true
    runAfterCreation: false
    activeDeadlineSeconds: 3600
    k8sJobSpec:
      jobContainer:
        appArmorProfile: unconfined
        workingDir: /opt/ansible
        image: "{{ .Values.images.sansible }}"
        command: ["/opt/bin/sansible_entrypoint.sh"]
        args:
          - ansible-playbook
          - -i
          - inventory/
          - -c
          - local
          - run.yml
          - -t
          - run-all-upgrade
          - -e
          - "common_packages_force_reinstall=true"
          - -e
          - "python_packages_force_reinstall=true"
          - -e
          - "cuda_force_upgrade=true"
          - -e
          - "cuda_samples_force=true"
          - -e
          - "perftest_force=true"
          - -e
          - "nccl_tests_force=true"
          - --diff
  manage-jail-state-dry-run:
    enabled: true
    checkType: "k8sJob"
    dependsOn:
      - "create-user-soperatorchecks"
    schedule: "0 11 * * *"
    suspend: false
    runAfterCreation: false
    activeDeadlineSeconds: 3600
    k8sJobSpec:
      jobContainer:
        appArmorProfile: unconfined
        workingDir: /opt/ansible
        image: "{{ .Values.images.sansible }}"
        command: ["/opt/bin/sansible_entrypoint.sh"]
        args:
          - ansible-playbook
          - -i
          - inventory/
          - -c
          - local
          - run.yml
          - -t
          - run-all-upgrade
          - --diff
          - --check
        env:
          - name: "ANSIBLE_STDOUT_CALLBACK"
            value: "ansible.posix.jsonl"
          - name: "ANSIBLE_FORCE_COLOR"
            value: "0"
  wait-for-topology:
    enabled: true
    checkType: "k8sJob"
    suspend: true
    runAfterCreation: true
    k8sJobSpec:
      scriptFile: "scripts/wait-for-topology.sh"
      jobContainer:
        appArmorProfile: unconfined
  wait-for-soperatorchecks-srun-ready:
    enabled: true
    checkType: "k8sJob"
    dependsOn:
      - "manage-jail-state"
      - "create-user-soperatorchecks"
    schedule: "0 0 1 1 *"
    suspend: true
    runAfterCreation: true
    k8sJobSpec:
      scriptFile: "scripts/wait-for-soperatorchecks-srun-ready.sh"
      jobContainer:
        appArmorProfile: unconfined
        image: "{{ .Values.images.slurmJob }}"
      mungeContainer:
        enabled: true
  retrigger-checks:
    enabled: true
    checkType: "k8sJob"
    suspend: true
    runAfterCreation: false
    k8sJobSpec:
      pythonScriptFile: "scripts/retrigger-checks.py"
      jobContainer:
        env:
          - name: "NAMESPACE"
            value: "{{ .Release.Namespace }}"

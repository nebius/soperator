checks:
  manager:
    enableNodeReplacement: false
    enableExtensiveCheck: false
    args:
      - --metrics-bind-address=:8443
      - --metrics-secure=true
      - --log-format=json
      - --log-level=info
      - --requeue-after-slurm-nodes=3m
      - --requeue-after-activecheck=10s
      - --requeue-after-activecheckjob=1m
      - --requeue-after-pod-ephemeral-storage-check=1m
      - --max-concurrent-reconciles=1
      - --cache-sync-timeout=2m
      - --not-ready-timeout=15m
      - --delete-not-ready-nodes=true
      - --leader-elect
      - --maintenance-condition-type=NebiusMaintenanceScheduled
    controllersEnabled:
      slurmapiclients: true
      slurmnodes: true
      k8snodes: true
      activecheck: true
      activecheckjob: true
      serviceaccount: true
      activecheckprolog: true
      podephemeralstoragecheck: true
    containerSecurityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop:
          - ALL
    env:
      slurmOperatorWatchNamespaces: '*'
      maintenanceIgnoreNodeLabels: "slurm.nebius.ai/nodeset=nfs"
    image:
      repository: cr.eu-north1.nebius.cloud/soperator/soperatorchecks
      tag: 4.0.2
    imagePullPolicy: Always
    resources:
      limits:
        memory: 128Mi
      requests:
        cpu: 100m
        memory: 64Mi
  replicas: 1
  serviceAccount:
    annotations: {}
kubernetesClusterDomain: cluster.local
serviceMonitor:
  enabled: true
  jobLabel: "soperatorchecks"
  interval: "30s"
  scrapeTimeout: "28s"
  additionalLabels: {}
  metricRelabelings: []
  relabelings: []

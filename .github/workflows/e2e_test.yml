name: E2E test soperator

on:
  workflow_dispatch:
    inputs:
      is_scheduled:
        description: "Triggered by the scheduler?"
        type: string
        required: false
        default: "false"
      terraform_repo_ref:
        description: "ref of terraform repo (defaults to current branch)"
        required: false
        default: ""
        type: string
      profile_env_var:
        description: "Name of the GitHub variable containing the profile YAML (defaults to env setting)"
        required: false
        default: ""
        type: string
      run_unstable_tests:
        description: "Run acceptance scenarios tagged @unstable"
        required: false
        default: "false"
        type: string

permissions:
  contents: read
  actions: write

jobs:
  resolve-profile:
    runs-on: ubuntu-latest
    environment: e2e
    outputs:
      nebius_project_id: ${{ steps.resolve.outputs.nebius_project_id }}
      nebius_region: ${{ steps.resolve.outputs.nebius_region }}
      nebius_tenant_id: ${{ steps.resolve.outputs.nebius_tenant_id }}
    env:
      E2E_PROFILE: ${{ vars[inputs.profile_env_var || vars.PROFILE_ENV_VAR] }}
    steps:
      - name: Install yq
        uses: frenck/action-setup-yq@c4b5be8b4a215c536a41d436757d9feb92836d4f # v1.0.2
        with:
          version: v4.44.6

      - name: Resolve profile
        id: resolve
        shell: bash
        run: |
          if [[ -z "$E2E_PROFILE" ]]; then
            echo "::error::E2E_PROFILE is empty or not set"
            exit 1
          fi
          echo "nebius_project_id=$(echo "$E2E_PROFILE" | yq -r '.nebius_project_id')" >> "$GITHUB_OUTPUT"
          echo "nebius_region=$(echo "$E2E_PROFILE" | yq -r '.nebius_region')" >> "$GITHUB_OUTPUT"
          echo "nebius_tenant_id=$(echo "$E2E_PROFILE" | yq -r '.nebius_tenant_id')" >> "$GITHUB_OUTPUT"

          # Write metadata for conflict detection
          jq -n \
            --arg project_id "$(echo "$E2E_PROFILE" | yq -r '.nebius_project_id')" \
            --argjson is_scheduled "${{ inputs.is_scheduled == 'true' }}" \
            '{project_id: $project_id, is_scheduled: $is_scheduled}' \
            > /tmp/e2e-run-metadata.json

      - name: Print run parameters
        shell: bash
        env:
          PROFILE_ENV_VAR: ${{ inputs.profile_env_var || vars.PROFILE_ENV_VAR }}
          TERRAFORM_REPO_REF: ${{ github.event.inputs.terraform_repo_ref || github.ref_name }}
        run: |
          {
            echo "### Run Parameters"
            echo ""
            echo "- Branch: \`${{ github.ref_name }}\`"
            echo "- Terraform branch: \`$TERRAFORM_REPO_REF\`"
            echo "- Profile variable: \`$PROFILE_ENV_VAR\`"
            echo ""
            echo '```yaml'
            echo "$E2E_PROFILE"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload run metadata
        uses: actions/upload-artifact@v7
        with:
          name: e2e-run-metadata
          path: /tmp/e2e-run-metadata.json
          retention-days: 1

      - name: Check for same-project conflicts
        if: inputs.is_scheduled == 'true'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CURRENT_RUN_ID: ${{ github.run_id }}
          PROJECT_ID: ${{ steps.resolve.outputs.nebius_project_id }}
        run: |
          echo "Checking for pending e2e runs on project $PROJECT_ID..."

          # Only check for pending runs — not in_progress.
          # One in_progress + one pending is fine (concurrency group handles that).
          # We self-cancel only to avoid being the 3rd run that would bump an existing pending run.
          #
          # Note: there is no global lock on resolve-profile (was removed because GitHub's
          # 1-pending limit caused queued runs to cancel each other with 3+ runs).
          # This means two concurrent resolve-profile jobs could both pass this check
          # before either becomes "pending" in e2e-test. This race requires a manual
          # and a scheduled run to overlap within the ~6s resolve-profile window,
          # giving a probability of ~0.05%. If it happens, GitHub bumps the older
          # pending run from the e2e-test queue — the user just re-triggers.
          pending_run_ids=$(gh api "repos/${{ github.repository }}/actions/workflows/e2e_test.yml/runs?status=pending" \
            --jq ".workflow_runs[] | select(.id != $CURRENT_RUN_ID) | .id") || true

          repo_url="https://github.com/${{ github.repository }}"

          if [ -z "$pending_run_ids" ]; then
            echo "No other pending e2e runs found. Proceeding."
            echo "### Conflict Check" >> "$GITHUB_STEP_SUMMARY"
            echo "No other pending e2e runs on project \`$PROJECT_ID\`. Proceeding." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          for run_id in $pending_run_ids; do
            echo "Checking run $run_id..."
            tmpdir=$(mktemp -d)
            if gh run download "$run_id" -n e2e-run-metadata -D "$tmpdir" -R "${{ github.repository }}"; then
              other_project=$(jq -r '.project_id' "$tmpdir/e2e-run-metadata.json")
              if [ "$other_project" == "$PROJECT_ID" ]; then
                echo "::warning::Conflict: run $run_id is already pending on project $PROJECT_ID. Cancelling this scheduled run."
                {
                  echo "### Conflict Check"
                  echo "Run [$run_id]($repo_url/actions/runs/$run_id) is already pending on project \`$PROJECT_ID\`."
                  echo "Cancelled this scheduled run to avoid bumping it from the queue."
                } >> "$GITHUB_STEP_SUMMARY"
                gh run cancel "$CURRENT_RUN_ID" -R "${{ github.repository }}"
                exit 1
              fi
              echo "Run $run_id targets project $other_project (no conflict)"
            else
              echo "Run $run_id has no metadata artifact yet, skipping"
            fi
            rm -rf "$tmpdir"
          done

          echo "No conflicting runs found. Proceeding."
          echo "### Conflict Check" >> "$GITHUB_STEP_SUMMARY"
          echo "No conflicting pending runs on project \`$PROJECT_ID\`. Proceeding." >> "$GITHUB_STEP_SUMMARY"

  e2e-test:
    needs: resolve-profile
    concurrency:
      # Per-project mutex: runs targeting the same Nebius project are serialized,
      # different projects can run concurrently. Queued runs wait, never cancel in-progress ones.
      cancel-in-progress: false
      group: e2e-${{ needs.resolve-profile.outputs.nebius_project_id }}
    runs-on: ubuntu-latest

    environment: e2e

    env:
      PATH_TO_INSTALLATION: "${{ github.workspace }}/terraform-repo/soperator/installations/example"
      TERRAFORM_REPO: "nebius/nebius-solution-library"
      TERRAFORM_REPO_REF: "${{ github.event.inputs.terraform_repo_ref || github.ref_name }}"
      O11Y_ACCESS_TOKEN: ${{ secrets.E2E_O11Y_ACCESS_TOKEN }}
      PROFILE_ENV_VAR: ${{ inputs.profile_env_var || vars.PROFILE_ENV_VAR }}
      E2E_PROFILE: ${{ vars[inputs.profile_env_var || vars.PROFILE_ENV_VAR] }}
      RUN_UNSTABLE_TESTS: ${{ inputs.run_unstable_tests || 'false' }}
      E2E_DOCKER_IMAGE: "cr.eu-north1.nebius.cloud/soperator/active_checks:12.9.0-ubuntu24.04-nccl_tests2.16.4-3935b93"
      E2E_ENROOT_IMAGE: "docker://cr.eu-north1.nebius.cloud#soperator/active_checks:12.9.0-ubuntu24.04-nccl_tests2.16.4-3935b93"

    steps:
      - name: Checkout repository
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          fetch-depth: 0

      - name: Install GO
        uses: actions/setup-go@44694675825211faa026b3c33043df3e48a5fa00 # v6.0.0
        with:
          go-version-file: "go.mod"
          cache: false

      - name: Add local bin to PATH
        run: echo "${{ github.workspace }}/bin" >> $GITHUB_PATH

      - name: Install Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "1.12.2"
          terraform_wrapper: false

      - name: Build e2e binary
        run: go build -o bin/e2e ./cmd/e2e

      - name: Export profile outputs
        shell: bash
        run: |
          echo "NEBIUS_PROJECT_ID=${{ needs.resolve-profile.outputs.nebius_project_id }}" >> "$GITHUB_ENV"
          echo "NEBIUS_REGION=${{ needs.resolve-profile.outputs.nebius_region }}" >> "$GITHUB_ENV"
          echo "NEBIUS_TENANT_ID=${{ needs.resolve-profile.outputs.nebius_tenant_id }}" >> "$GITHUB_ENV"

      - name: Install Nebius CLI
        shell: bash
        env:
          NEBIUS_CLI_VERSION: "0.12.164"
          NEBIUS_INSTALL_FOLDER: "${{ github.workspace }}/bin"
        run: |
          echo "Installing Nebius CLI ${NEBIUS_CLI_VERSION}..."
          curl -sSL https://storage.eu-north1.nebius.cloud/cli/install.sh | bash

      - name: Configure Nebius CLI
        shell: bash
        env:
          NEBIUS_CLI_CONFIG: ${{ vars.NEBIUS_CLI_CONFIG }}
          NEBIUS_PRIVATE_KEY: ${{ secrets.NEBIUS_PRIVATE_KEY }}
          NEBIUS_TELEMETRY_PRIVATE_KEY: ${{ secrets.NEBIUS_TELEMETRY_PRIVATE_KEY }}
        run: |
          mkdir -p "$HOME/.nebius"
          echo "$NEBIUS_CLI_CONFIG" > "$HOME/.nebius/config.yaml"
          yq -i '.profiles.default.private-key = strenv(NEBIUS_PRIVATE_KEY)' "$HOME/.nebius/config.yaml"
          yq -i '.profiles.soperator-telemetry.private-key = strenv(NEBIUS_TELEMETRY_PRIVATE_KEY)' "$HOME/.nebius/config.yaml"
          chmod 600 "$HOME/.nebius/config.yaml"

      - name: Install AWS CLI v2
        run: |
          if command -v aws >/dev/null 2>&1; then
            echo "AWS CLI already installed: $(aws --version)"
            exit 0
          fi

          echo "AWS CLI not found, installing..."
          curl "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o "awscliv2.zip"
          unzip -q awscliv2.zip
          sudo ./aws/install --update

      - name: Check tools versions
        shell: bash
        run: |
          echo "yq:"
          which yq
          yq --version
          echo ""

          echo "jq:"
          which jq
          jq --version
          echo ""

          echo "nebius:"
          which nebius
          nebius version
          echo ""

          echo "terraform:"
          which terraform
          terraform --version
          echo ""

          echo "kubectl:"
          which kubectl
          kubectl version --client
          echo ""

          echo "aws:"
          which aws
          aws --version
          echo ""

          echo "go:"
          which go
          go version

      - name: Find latest successful build run on current branch
        id: find_build
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Looking for successful build run on branch: ${{ github.ref_name }}"

          run_info=$(gh api -X GET \
            "/repos/${{ github.repository }}/actions/workflows/one_job.yml/runs" \
            -F branch="${{ github.ref_name }}" \
            -F status=success \
            -F per_page=1 \
            --jq '.workflow_runs[0] | {id: .id, head_sha: .head_sha, created_at: .created_at, html_url: .html_url}')

          run_id=$(jq -r '.id' <<<"$run_info")

          if [[ "$run_id" == "null" || -z "$run_id" ]]; then
            echo "::error::No successful build found on branch ${{ github.ref_name }}"
            exit 1
          fi

          head_sha=$(jq -r '.head_sha' <<<"$run_info")
          created_at=$(jq -r '.created_at' <<<"$run_info")
          html_url=$(jq -r '.html_url' <<<"$run_info")

          echo "Found build: $run_id"

          echo "run_id=$run_id" >> $GITHUB_OUTPUT
          echo "head_sha=$head_sha" >> $GITHUB_OUTPUT
          echo "created_at=$created_at" >> $GITHUB_OUTPUT
          echo "html_url=$html_url" >> $GITHUB_OUTPUT

      - name: Download artifact with version
        shell: bash
        run: |
          gh run download ${{ steps.find_build.outputs.run_id }} -n version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Read version
        shell: bash
        run: |
          SOPERATOR_VERSION=$(sed -n '1p' version.txt)
          SOPERATOR_UNSTABLE=$(sed -n '2p' version.txt)

          echo "SOPERATOR_VERSION=$SOPERATOR_VERSION" >> $GITHUB_ENV
          echo "SOPERATOR_UNSTABLE=$SOPERATOR_UNSTABLE" >> $GITHUB_ENV

      - name: Checkout Terraform repository
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          repository: ${{ env.TERRAFORM_REPO }}
          ref: ${{ env.TERRAFORM_REPO_REF }}
          path: "${{ github.workspace }}/terraform-repo"
          fetch-depth: 0

      - name: Check capacity
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_RUN_ID: ${{ github.run_id }}
        run: |
          # Remove credentials, so .envrc would create a fresh access token with long TTL.
          rm -f "$HOME/.nebius/credentials.yaml"

          cd ${{ env.PATH_TO_INSTALLATION }}
          source .envrc
          cd -

          echo "### Capacity Check" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          bin/e2e check-capacity 2>&1 | tee -a "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: Terraform Init
        timeout-minutes: 30
        run: |
          cd ${{ env.PATH_TO_INSTALLATION }}
          source .envrc
          cd -

          aws configure set aws_access_key_id $AWS_ACCESS_KEY_ID
          aws configure set aws_secret_access_key $AWS_SECRET_ACCESS_KEY
          aws configure set region $NEBIUS_REGION
          aws configure set endpoint_url https://storage.$NEBIUS_REGION.nebius.cloud:443

          bin/e2e init

      - name: Terraform Apply
        timeout-minutes: 90
        run: |
          cd ${{ env.PATH_TO_INSTALLATION }}
          source .envrc
          cd -

          # Configure AWS CLI
          aws configure set aws_access_key_id $AWS_ACCESS_KEY_ID
          aws configure set aws_secret_access_key $AWS_SECRET_ACCESS_KEY
          aws configure set region $NEBIUS_REGION
          aws configure set endpoint_url https://storage.$NEBIUS_REGION.nebius.cloud:443

          bin/e2e apply

      - name: Acceptance Tests
        timeout-minutes: 90
        env:
          E2E_REPORT_DIR: e2e-reports/acceptance
        run: |
          bin/e2e acceptance

      - name: Acceptance Summary
        if: always()
        shell: bash
        run: |
          json="e2e-reports/acceptance/acceptance.cucumber.json"
          if [[ ! -f "$json" ]]; then
            echo "no cucumber report at $json"
            exit 0
          fi
          python3 .github/scripts/acceptance_summary.py "$json" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload Acceptance Reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: acceptance-reports
          path: e2e-reports/acceptance/
          retention-days: 14

      - name: K8s Cluster Info and NodeGroups
        if: always()
        shell: bash
        run: |
          echo "=== K8s Clusters ==="
          clusters_table=$(nebius mk8s cluster list --parent-id "$NEBIUS_PROJECT_ID" --format table)
          echo "$clusters_table"

          clusters_json=$(nebius mk8s cluster list --parent-id "$NEBIUS_PROJECT_ID" --format json)
          cluster_ids=$(echo "$clusters_json" | jq -r '.items[].metadata.id // empty')

          {
            echo "### K8s Clusters"
            echo '```'
            echo "$clusters_table"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

          for cluster_id in $cluster_ids; do
            echo ""
            echo "--- Node groups for cluster: $cluster_id ---"
            ng_json=$(nebius mk8s node-group list --parent-id "$cluster_id" --page-size 1000 --format json)

            # Summary table
            summary=$(echo "$ng_json" | jq -r '
              ["ID", "NAME", "STATE", "READY/TARGET"],
              ["--", "----", "-----", "------------"],
              (.items[] |
                [
                  .metadata.id,
                  .metadata.name,
                  .status.state,
                  "\(.status.ready_node_count // "?")/\(.status.target_node_count // "?")"
                ]
              ) | @tsv')
            echo "$summary" | column -t

            {
              echo "### Node Groups: $cluster_id"
              echo '```'
              echo "$summary" | column -t
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"

            # Full JSON for non-RUNNING node groups
            not_running=$(echo "$ng_json" | jq '[.items[] | select(.status.state != "RUNNING")]')
            if [ "$(echo "$not_running" | jq 'length')" -gt 0 ]; then
              echo ""
              echo "=== Non-RUNNING node groups (full details) ==="
              echo "$not_running" | jq .
            fi
          done

      - name: "K8s Cluster: Pods"
        if: always()
        shell: bash
        run: kubectl get pods -A -o wide

      - name: "K8s Cluster: Events"
        if: always()
        shell: bash
        run: kubectl get events -A --sort-by='.lastTimestamp'

      - name: "K8s Cluster: Nodes"
        if: always()
        shell: bash
        run: |
          kubectl get nodes
          echo ""
          kubectl get nodes -o yaml

      - name: "K8s Cluster: Jobs"
        if: always()
        shell: bash
        run: |
          kubectl -n soperator get job
          echo ""
          kubectl -n soperator get job -o yaml

      - name: "K8s Cluster: Helm Releases"
        if: always()
        shell: bash
        run: |
          kubectl get helmreleases -n flux-system
          echo ""
          kubectl get helmreleases -n flux-system -o yaml

      - name: "K8s Cluster: Slurm Cluster CRs"
        if: always()
        shell: bash
        run: |
          kubectl get slurmclusters -A
          echo ""
          kubectl get slurmclusters -A -o yaml

      - name: "K8s Cluster: Slurm Active Checks CRs"
        if: always()
        shell: bash
        run: |
          kubectl get activechecks -A
          echo ""
          kubectl get activechecks -A -o yaml

      - name: Slurm Cluster State
        if: always()
        shell: bash
        run: |
          kubectl exec -n soperator controller-0 -- sinfo -N || true
          kubectl exec -n soperator controller-0 -- squeue || true
          kubectl exec -n soperator controller-0 -- sdiag || true
          kubectl exec -n soperator controller-0 -- sacct --format=JobID,JobName,Partition,Account,AllocCPUS,State,ExitCode -S now-6hours || true
          kubectl exec -n soperator controller-0 -- sacct --parsable2 --allusers --starttime=now-6hours | column -t -s'|'

      - name: Collect Full Kubernetes Cluster Info
        if: always()
        shell: bash
        run: |
          mkdir -p ./cluster-info
          kubectl cluster-info dump --namespaces=kruise-system,soperator-system,soperator,flux-system,cert-manager-system --output-directory=./cluster-info

      - name: Upload Full Kubernetes Cluster Info
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: cluster-info
          path: ./cluster-info
          retention-days: 7

      - name: Collect Jail Files
        if: always()
        shell: bash
        run: |
          mkdir -p ./jail/etc/slurm ./jail/opt/soperator-outputs
          SCONFIG_POD=$(kubectl get pod -n soperator \
            -l app.kubernetes.io/component=sconfigcontroller \
            --field-selector=status.phase=Running \
            -o jsonpath='{.items[0].metadata.name}' 2>/dev/null)
          if [[ -n "$SCONFIG_POD" ]]; then
            echo "Copying jail files from $SCONFIG_POD"
            kubectl exec -n soperator "$SCONFIG_POD" -- find /mnt/jail -maxdepth 4 -not -path '*/proc/*' > ./jail/tree.txt 2>&1 || true
            .github/workflows/scripts/retry.sh \
              kubectl cp "soperator/$SCONFIG_POD:/mnt/jail/etc/slurm/" ./jail/etc/slurm
            .github/workflows/scripts/retry.sh \
              kubectl cp "soperator/$SCONFIG_POD:/mnt/jail/opt/soperator-outputs" ./jail/opt/soperator-outputs
          else
            echo "No running sconfigcontroller pod found, skipping jail files collection"
          fi

      - name: Zip Jail
        if: always()
        run: |
          zip -r jail jail

      - name: Upload Jail
        if: always()
        uses: actions/upload-artifact@v7
        with:
          archive: false
          name: jail
          path: jail.zip
          retention-days: 7

      - name: Terraform Destroy
        if: always()
        timeout-minutes: 30
        env:
          # Opt in to terraform DEBUG logging only for the destroy flow.
          # bin/e2e destroy reads this and calls tf.SetLogPath() on the
          # terraform-exec handle — otherwise terraform-exec strips TF_LOG from
          # the subprocess env. Init/Apply steps don't set this, so they stay
          # clean. See internal/e2e/destroy.go.
          TF_DESTROY_LOG_PATH: ${{ runner.temp }}/tf-destroy.log
        run: |
          cd ${{ env.PATH_TO_INSTALLATION }}
          source .envrc
          cd -

          # Configure AWS CLI (in case env was lost)
          aws configure set aws_access_key_id $AWS_ACCESS_KEY_ID
          aws configure set aws_secret_access_key $AWS_SECRET_ACCESS_KEY
          aws configure set region $NEBIUS_REGION
          aws configure set endpoint_url https://storage.$NEBIUS_REGION.nebius.cloud:443

          bin/e2e destroy

      - name: Upload Terraform Destroy debug log
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: tf-destroy-debug-log
          path: ${{ runner.temp }}/tf-destroy.log
          if-no-files-found: ignore
          retention-days: 7
          # Debug log is plain text terraform DEBUG output, highly
          # compressible, and runner CPU is free, so max out the DEFLATE level.
          compression-level: 9

      - name: Force cleanup compute instances on failure
        if: failure()
        shell: bash
        run: |
          echo "=== Node groups state before cleanup ==="
          clusters_json=$(nebius mk8s cluster list --parent-id "$NEBIUS_PROJECT_ID" --format json 2>/dev/null || true)
          cluster_ids=$(echo "$clusters_json" | jq -r '.items[].metadata.id // empty' 2>/dev/null || true)

          for cluster_id in $cluster_ids; do
            echo ""
            echo "--- Node groups for cluster: $cluster_id ---"
            nebius mk8s node-group list --parent-id "$cluster_id" --page-size 1000 --format yaml || true
          done

          echo ""
          echo "=== Forcing cleanup of remaining compute instances ==="

          # Get nodes from the cluster (ignore errors if cluster is already gone)
          nodes=$(kubectl get nodes -o jsonpath='{.items[*].metadata.name}' 2>/dev/null || true)

          if [ -z "$nodes" ]; then
            echo "No nodes found or cluster not accessible"
            exit 0
          fi

          echo "Found nodes: $nodes"

          operations=()
          for node in $nodes; do
            echo "Deleting compute instance: $node"
            op=$(nebius compute instance delete --id="$node" --async 2>/dev/null) && operations+=("$op") || echo "Failed to delete instance $node (may already be deleted)"
          done

          echo ""
          echo "=== Operation statuses ==="
          for op in "${operations[@]}"; do
            echo "--- $op ---"
            nebius compute instance operation get --id="$op" || true
          done

          echo "=== Cleanup complete ==="

      - name: Add build info to job summary
        if: always()
        shell: bash
        run: |
          set -x

          head_sha="${{ steps.find_build.outputs.head_sha }}"
          created_at="${{ steps.find_build.outputs.created_at }}"
          html_url="${{ steps.find_build.outputs.html_url }}"
          run_id="${{ steps.find_build.outputs.run_id }}"
          repo_url="https://github.com/${{ github.repository }}"
          terraform_repo_url="https://github.com/${{ env.TERRAFORM_REPO }}"
          terraform_repo_dir="${{ github.workspace }}/terraform-repo"

          # Run all git invocations up front so their stderr is visible in the
          # step log (instead of being swallowed inside the summary block).
          # Failures are tolerated — this step is purely informational and must
          # not fail the job, but the reason for any failure must be visible.
          recent_commits=""
          not_covered_commits=""
          head_sha_reachable=""
          terraform_recent_commits=""

          if [[ -n "$run_id" && "$run_id" != "null" && -n "$head_sha" ]]; then
            recent_commits=$(git log --format='%h|%s|%ar|%an' -3 "$head_sha") \
              || echo "git log -3 $head_sha failed with exit $?"

            if git merge-base --is-ancestor "$head_sha" HEAD; then
              head_sha_reachable=yes
              not_covered_commits=$(git log --format='%h|%s|%ar|%an' --first-parent "$head_sha"..HEAD) \
                || echo "git log --first-parent $head_sha..HEAD failed with exit $?"
            else
              head_sha_reachable=no
            fi
          fi

          if [[ -d "$terraform_repo_dir/.git" ]]; then
            terraform_recent_commits=$(git -C "$terraform_repo_dir" log --format='%h|%s|%ar|%an' -3) \
              || echo "git log -3 in $terraform_repo_dir failed with exit $?"
          fi

          {
            echo "### Image Build Information"

            if [[ -n "$run_id" && "$run_id" != "null" ]]; then
              echo "[Run $run_id]($html_url) at $created_at"
              echo "### Latest Commits on ${{ github.ref_name }}"
              if [[ -n "$recent_commits" ]]; then
                while IFS='|' read -r hash msg date author; do
                  echo "- [$hash]($repo_url/commit/$hash): $msg ($date) <$author>"
                done <<< "$recent_commits"
              fi

              if [[ "$head_sha_reachable" == "yes" ]]; then
                if [[ -n "$not_covered_commits" ]]; then
                  echo ""
                  echo "### Not Covered Commits"
                  while IFS='|' read -r hash msg date author; do
                    echo "- [$hash]($repo_url/commit/$hash): $msg ($date) <$author>"
                  done <<< "$not_covered_commits"
                fi
              elif [[ "$head_sha_reachable" == "no" ]]; then
                echo ""
                echo "### Warning"
                echo "Build commit $head_sha is not reachable from current HEAD. Cannot determine uncovered commits."
              fi
            else
              echo "No successful build was found."
            fi

            # Terraform repo latest commits
            echo ""
            echo "### Terraform Repo Latest Commits on ${{ env.TERRAFORM_REPO_REF }}"
            if [[ -d "$terraform_repo_dir/.git" ]]; then
              if [[ -n "$terraform_recent_commits" ]]; then
                while IFS='|' read -r hash msg date author; do
                  echo "- [$hash]($terraform_repo_url/commit/$hash): $msg ($date) <$author>"
                done <<< "$terraform_recent_commits"
              fi
            else
              echo "Terraform repo not checked out."
            fi
          } >> $GITHUB_STEP_SUMMARY

  notify-failure:
    name: Notify Slack on E2E failure
    needs: [resolve-profile, e2e-test]
    # Only fire when the run targeted the default terraform branch (empty input
    # falls back to github.ref_name in e2e-test). Custom terraform branches are
    # usually experiments and shouldn't page e2e owners on failure.
    if: |
      always() &&
      (needs.resolve-profile.result == 'failure' || needs.e2e-test.result == 'failure') &&
      (github.ref_name == 'main' || startsWith(github.ref_name, 'soperator-release-')) &&
      (inputs.terraform_repo_ref == '' || inputs.terraform_repo_ref == github.ref_name)
    runs-on: ubuntu-latest
    environment: e2e
    steps:
      - name: Send Slack notification
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.E2E_SLACK_WEBHOOK_URL }}
          BRANCH: ${{ github.ref_name }}
          PROFILE: ${{ inputs.profile_env_var || vars.PROFILE_ENV_VAR }}
          RUN_ATTEMPT: ${{ github.run_attempt }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        shell: bash
        run: |
          if [[ "$RUN_ATTEMPT" -gt 1 ]]; then
            RUN_URL+="/attempts/${RUN_ATTEMPT}"
          fi

          # Use top-level `text` (not `attachments`) so the Slack MCP plugin
          # can read the body — see slackapi/slack-mcp-plugin#24. This trades
          # the red side bar (an attachments-only feature) for triage-bot
          # readability, which we care about more.
          payload=$(jq --null-input \
            --arg branch "$BRANCH" \
            --arg profile "$PROFILE" \
            --arg run_url "$RUN_URL" \
            --arg runbook_url "https://nebius.atlassian.net/wiki/spaces/SCHED/pages/998015487/E2E+Runbook" \
            '{
              text: (
                ":warning: *E2E Test Failure*\n"
                + "<\($run_url)|Workflow> | <\($runbook_url)|Runbook>\n"
                + "Branch: `\($branch)`\n"
                + "Profile: `\($profile)`"
              )
            }')

          curl -X POST "$SLACK_WEBHOOK_URL" \
            -H 'Content-type: application/json' \
            --data "$payload"

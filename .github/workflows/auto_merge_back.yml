name: "Auto merge back"

on:
  push:
    branches:
      - 'soperator-release-*'

jobs:
  create-merge-back-pr:
    name: Create merge back PR
    runs-on: self-hosted

    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0

      - name: Run auto merge-back workflow
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: .github/workflows/scripts/auto-merge-back.sh

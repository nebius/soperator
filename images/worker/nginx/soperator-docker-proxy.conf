include /etc/nginx/modules-enabled/*.conf;

user root;
worker_processes auto;
pid /var/run/nginx-soperator-docker-proxy.pid;

error_log /dev/stderr info;

events {
    worker_connections 1024;
}

http {
    access_log /dev/stdout;
    client_max_body_size 0;
    lua_package_path "/etc/nginx/lua/?.lua;;";

    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
    }

    upstream docker_daemon {
        server unix:/var/run/docker.sock;
        keepalive 32;
    }

    server {
        listen unix:/var/run/soperator-docker.sock;

        location / {
            access_by_lua_file /etc/nginx/lua/docker_proxy.lua;

            proxy_http_version 1.1;
            proxy_buffering off;
            proxy_request_buffering on;
            proxy_read_timeout 1d;
            proxy_send_timeout 1d;
            proxy_set_header Host docker;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_pass http://docker_daemon;
        }
    }
}

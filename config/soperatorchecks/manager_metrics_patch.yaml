apiVersion: apps/v1
kind: Deployment
metadata:
  name: soperatorchecks
  namespace: system
spec:
  template:
    spec:
      containers:
      - name: manager
        args:
        - "--health-probe-bind-address=:8081"
        - "--metrics-bind-address=:8443"
        - "--metrics-secure=true"
        - "--leader-elect"
        ports:
        - containerPort: 8443
          protocol: TCP
          name: https
